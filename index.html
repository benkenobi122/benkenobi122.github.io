<!DOCTYPE html>
<html>
<head>
  <title>Certified Braces Diva 💅</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff4ecd, #7a5cff, #00d4ff);
      background-size: 300% 300%;
      animation: bgMove 8s infinite alternate;
      color: white;
      text-align: center;
    }

    @keyframes bgMove {
      0% { background-position: left; }
      100% { background-position: right; }
    }

    h1 {
      margin-top: 100px;
      font-size: 60px;
      text-shadow: 0 0 20px black;
      letter-spacing: 3px;
    }

    .badge {
      font-size: 22px;
      margin-top: 10px;
      opacity: 0.95;
    }

    .glow {
      margin-top: 25px;
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      background: white;
      color: black;
      box-shadow: 0 0 20px white;
      transition: 0.3s;
    }

    .glow:hover {
      transform: scale(1.1);
      box-shadow: 0 0 35px white;
    }

    .footer {
      position: fixed;
      bottom: 10px;
      width: 100%;
      font-size: 12px;
      opacity: 0.6;
    }

    .sparkle {
      position: fixed;
      font-size: 18px;
      animation: float 3s infinite ease-in-out;
      opacity: 0.7;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
      100% { transform: translateY(0px); }
    }
  </style>
</head>

<body>

  <h1>LET’S RIDE 💅🔥</h1>

  <div class="badge">
    💖 CERTIFIED BRACES DIVA 💖
  </div>

  <p>Welcome to the ultimate glow-up zone</p>

  <!-- button still here just for vibes -->
  <button class="glow">
    ✨ DIVA MODE ACTIVE ✨
  </button>

  <!-- sparkles -->
  <div class="sparkle" style="top:20%; left:10%;">✨</div>
  <div class="sparkle" style="top:40%; left:80%;">💖</div>
  <div class="sparkle" style="top:70%; left:30%;">✨</div>
  <div class="sparkle" style="top:60%; left:60%;">💎</div>

  <div class="footer">
    Certified Braces Diva Era 💅 built by Ben
  </div>

</body>
</html>
